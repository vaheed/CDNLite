services:
  pdns:
    image: powerdns/pdns-auth-49
    restart: unless-stopped
    entrypoint: ["/etc/powerdns/entrypoint.sh"]
    ports:
      - "${PDNS_DNS_PORT}:53/udp"
      - "${PDNS_DNS_PORT}:53/tcp"
      - "${PDNS_API_PORT}:8081/tcp"
    volumes:
      - ./config/pdns.conf:/etc/powerdns/pdns.conf.template:ro
      - ./config/entrypoint.sh:/etc/powerdns/entrypoint.sh:ro
      - pdnsdata:/var/lib/powerdns
    environment:
      PDNS_API_KEY: ${PDNS_API_KEY}
      PDNS_REPLICA_IP: ${PDNS_REPLICA_IP}
    healthcheck:
      test: ["CMD-SHELL", "pdns_control ping 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  pdnsdata:
