# PowerDNS primary - managed by CDNLite
launch=gsqlite3
gsqlite3-database=/var/lib/powerdns/pdns.sqlite3

api=yes
api-key=$PDNS_API_KEY
webserver=yes
webserver-address=0.0.0.0
webserver-port=8081
webserver-allow-from=0.0.0.0/0,::/0

primary=yes
secondary=no

# Allow the replica to pull zones (AXFR)
allow-axfr-ips=$PDNS_REPLICA_IP

# Security
local-address=0.0.0.0
local-port=53
log-dns-queries=no
loglevel=4
