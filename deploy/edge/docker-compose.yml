services:
  edge-mmdb-updater:
    image: ghcr.io/${REGISTRY_OWNER}/cdnlite-dnsgeo-mmdb-updater:${IMAGE_TAG}
    restart: unless-stopped
    environment:
      MMDB_PROVIDER: ${CDNLITE_MMDB_PROVIDER}
      MMDB_DOWNLOAD_URL: ${CDNLITE_MMDB_DOWNLOAD_URL}
      MMDB_DOWNLOAD_INTERVAL_SECONDS: ${CDNLITE_MMDB_DOWNLOAD_INTERVAL_SECONDS}
      MMDB_DOWNLOAD_RETRIES: ${CDNLITE_MMDB_DOWNLOAD_RETRIES}
      MMDB_EXPECTED_SHA256: ${CDNLITE_MMDB_EXPECTED_SHA256}
      MMDB_TARGET_FILE: GeoLite2-City.mmdb
    volumes:
      - cdnlite-edge-mmdb:/mmdb
    healthcheck:
      test: ["CMD-SHELL", "/usr/local/bin/mmdb-healthcheck.sh"]
      interval: 5s
      timeout: 5s
      retries: 120
      start_period: 60s

  edge:
    image: ghcr.io/${REGISTRY_OWNER}/cdnlite-edge:${IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      edge-mmdb-updater:
        condition: service_healthy
    ports:
      - "${EDGE_HOST_PORT}:8081"
      - "${EDGE_TLS_HOST_PORT}:8443"
    volumes:
      - cdnlite-edge-data:/var/lib/cdnlite
      - cdnlite-edge-mmdb:/var/lib/cdnlite/mmdb:ro
    environment:
      EDGE_ID: ${EDGE_ID}
      EDGE_REGION: ${EDGE_REGION}
      DEV_MODE: ${DEV_MODE}
      CDNLITE_CACHE_DEFAULT_TTL: ${CDNLITE_CACHE_DEFAULT_TTL}
      METRIC_PATH: ${METRIC_PATH}
      EDGE_CONFIG_MAX_STALE_SECONDS: ${EDGE_CONFIG_MAX_STALE_SECONDS}
      EDGE_SYNC_STATUS_PATH: ${EDGE_SYNC_STATUS_PATH}
      SECURITY_EVENT_PATH: ${SECURITY_EVENT_PATH}
      CDNLITE_EDGE_MMDB_FILE: ${CDNLITE_EDGE_MMDB_FILE}
      CDNLITE_EDGE_WORKER_PROCESSES: ${CDNLITE_EDGE_WORKER_PROCESSES}
      CDNLITE_EDGE_WORKER_CONNECTIONS: ${CDNLITE_EDGE_WORKER_CONNECTIONS}
      CDNLITE_EDGE_LIMITS_DICT_SIZE: ${CDNLITE_EDGE_LIMITS_DICT_SIZE}
      CDNLITE_EDGE_REQUEST_CONTEXT_DICT_SIZE: ${CDNLITE_EDGE_REQUEST_CONTEXT_DICT_SIZE}
      CDNLITE_EDGE_METRIC_QUEUE_DICT_SIZE: ${CDNLITE_EDGE_METRIC_QUEUE_DICT_SIZE}
      CDNLITE_EDGE_SECURITY_EVENT_QUEUE_DICT_SIZE: ${CDNLITE_EDGE_SECURITY_EVENT_QUEUE_DICT_SIZE}
      CDNLITE_EDGE_CONFIG_MAX_BYTES: ${CDNLITE_EDGE_CONFIG_MAX_BYTES}
      CDNLITE_EDGE_CONFIG_REFRESH_SECONDS: ${CDNLITE_EDGE_CONFIG_REFRESH_SECONDS}
      CDNLITE_EDGE_TELEMETRY_BATCH_SIZE: ${CDNLITE_EDGE_TELEMETRY_BATCH_SIZE}
      CDNLITE_EDGE_TELEMETRY_FLUSH_INTERVAL_SECONDS: ${CDNLITE_EDGE_TELEMETRY_FLUSH_INTERVAL_SECONDS}
      CDNLITE_EDGE_TELEMETRY_QUEUE_MAX_ITEMS: ${CDNLITE_EDGE_TELEMETRY_QUEUE_MAX_ITEMS}
      CDNLITE_EDGE_TELEMETRY_QUEUE_MAX_BYTES: ${CDNLITE_EDGE_TELEMETRY_QUEUE_MAX_BYTES}
      CDNLITE_EDGE_RESOLVER: ${CDNLITE_EDGE_RESOLVER}
      CDNLITE_EDGE_CLIENT_HEADER_BUFFER_SIZE: ${CDNLITE_EDGE_CLIENT_HEADER_BUFFER_SIZE}
      CDNLITE_EDGE_LARGE_CLIENT_HEADER_BUFFERS: ${CDNLITE_EDGE_LARGE_CLIENT_HEADER_BUFFERS}
      CDNLITE_EDGE_CLIENT_BODY_BUFFER_SIZE: ${CDNLITE_EDGE_CLIENT_BODY_BUFFER_SIZE}
      CDNLITE_EDGE_CLIENT_MAX_BODY_SIZE: ${CDNLITE_EDGE_CLIENT_MAX_BODY_SIZE}
      CDNLITE_EDGE_PROXY_CONNECT_TIMEOUT: ${CDNLITE_EDGE_PROXY_CONNECT_TIMEOUT}
      CDNLITE_EDGE_PROXY_READ_TIMEOUT: ${CDNLITE_EDGE_PROXY_READ_TIMEOUT}
      CDNLITE_EDGE_PROXY_SEND_TIMEOUT: ${CDNLITE_EDGE_PROXY_SEND_TIMEOUT}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8081/health >/dev/null 2>&1 || exit 1"]
      interval: 2s
      timeout: 2s
      retries: 60

  edge-agent:
    image: ghcr.io/${REGISTRY_OWNER}/cdnlite-edge-agent:${IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      edge:
        condition: service_healthy
    volumes:
      - cdnlite-edge-data:/var/lib/cdnlite
    environment:
      CORE_URL: ${CORE_URL}
      EDGE_ID: ${EDGE_ID}
      EDGE_TOKEN: ${EDGE_TOKEN}
      EDGE_HOSTNAME: ${EDGE_HOSTNAME}
      EDGE_PUBLIC_IP: ${EDGE_PUBLIC_IP}
      EDGE_REGION: ${EDGE_REGION}
      EDGE_COUNTRY: ${EDGE_COUNTRY}
      EDGE_CONTINENT: ${EDGE_CONTINENT}
      EDGE_VERSION: ${EDGE_VERSION}
      DEV_MODE: ${DEV_MODE}
      EDGE_CONFIG_PATH: ${EDGE_CONFIG_PATH}
      EDGE_CONFIG_CACHE_PATH: ${EDGE_CONFIG_CACHE_PATH}
      EDGE_SYNC_STATUS_PATH: ${EDGE_SYNC_STATUS_PATH}
      EDGE_CONFIG_MAX_STALE_SECONDS: ${EDGE_CONFIG_MAX_STALE_SECONDS}
      METRIC_PATH: ${METRIC_PATH}
      SECURITY_EVENT_PATH: ${SECURITY_EVENT_PATH}
      EDGE_AGENT_IDLE: ${EDGE_AGENT_IDLE}

volumes:
  cdnlite-edge-data:
  cdnlite-edge-mmdb:
