services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 2s
      timeout: 2s
      retries: 30
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      cdnlite-internal:
        aliases:
          - postgres

  core:
    image: ghcr.io/${REGISTRY_OWNER}/cdnlite-core:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      APP_ENV: ${APP_ENV}
      APP_LOG_ENABLED: ${APP_LOG_ENABLED}
      APP_LOG_LEVEL: ${APP_LOG_LEVEL}
      APP_DEBUG: ${APP_DEBUG}
      CDNLITE_API_TOKEN: ${CDNLITE_API_TOKEN}
      CDNLITE_ORIGIN_SHIELD_SECRET: ${CDNLITE_ORIGIN_SHIELD_SECRET}
      CDNLITE_BOOTSTRAP_EDGE_TOKEN: ${CDNLITE_BOOTSTRAP_EDGE_TOKEN}
      CDNLITE_BOOTSTRAP_EDGE_ID: ${CDNLITE_BOOTSTRAP_EDGE_ID}
      CDNLITE_BOOTSTRAP_EDGE_TOKEN_VALUE: ${CDNLITE_BOOTSTRAP_EDGE_TOKEN_VALUE}
      EDGE_ID: ${EDGE_ID}
      EDGE_TOKEN: ${EDGE_TOKEN}
      CDNLITE_CDN_ZONE: ${CDNLITE_CDN_ZONE}
      CDNLITE_CDN_PROXY_HOST: ${CDNLITE_CDN_PROXY_HOST}
      CDNLITE_EDGE_TTL: ${CDNLITE_EDGE_TTL}
      CDNLITE_EDGE_HEALTH_MODE: ${CDNLITE_EDGE_HEALTH_MODE}
      CDNLITE_EDGE_HEALTH_PORT: ${CDNLITE_EDGE_HEALTH_PORT}
      CDNLITE_EDGE_HEALTH_URL: ${CDNLITE_EDGE_HEALTH_URL}
      CDNLITE_EDGE_HEALTH_TIMEOUT: ${CDNLITE_EDGE_HEALTH_TIMEOUT}
      CDNLITE_EDGE_HEALTH_INTERVAL: ${CDNLITE_EDGE_HEALTH_INTERVAL}
      CDNLITE_EDGE_HEALTH_MIN_FAILURES: ${CDNLITE_EDGE_HEALTH_MIN_FAILURES}
      CDNLITE_EDGE_SELECTOR: ${CDNLITE_EDGE_SELECTOR}
      CDNLITE_EDGE_BACKUP_SELECTOR: ${CDNLITE_EDGE_BACKUP_SELECTOR}
      CDNLITE_EDGE_APEX_MODE: ${CDNLITE_EDGE_APEX_MODE}
      CDNLITE_GEO_DEFAULT_POLICY: ${CDNLITE_GEO_DEFAULT_POLICY}
      CDNLITE_GEO_ENABLE_COUNTRY_RULES: ${CDNLITE_GEO_ENABLE_COUNTRY_RULES}
      CDNLITE_GEO_ENABLE_CONTINENT_RULES: ${CDNLITE_GEO_ENABLE_CONTINENT_RULES}
      CDNLITE_GEO_ENABLE_REGION_RULES: ${CDNLITE_GEO_ENABLE_REGION_RULES}
      CDNLITE_NS1_IP: ${CDNLITE_NS1_IP}
      CDNLITE_NS2_IP: ${CDNLITE_NS2_IP}
      CDNLITE_BOOTSTRAP_EDGE_DNS: ${CDNLITE_BOOTSTRAP_EDGE_DNS}
      CDNLITE_SSL_SECRET_KEY: ${CDNLITE_SSL_SECRET_KEY}
      CDNLITE_ACME_DIRECTORY_URL: ${CDNLITE_ACME_DIRECTORY_URL}
      CDNLITE_ACME_CONTACT_EMAIL: ${CDNLITE_ACME_CONTACT_EMAIL}
      CDNLITE_ACME_DNS_PROPAGATION_SECONDS: ${CDNLITE_ACME_DNS_PROPAGATION_SECONDS}
      CDNLITE_ACME_POLL_ATTEMPTS: ${CDNLITE_ACME_POLL_ATTEMPTS}
      CDNLITE_ADMIN_SESSION_TTL_SECONDS: ${CDNLITE_ADMIN_SESSION_TTL_SECONDS}
      CDNLITE_CORS_ALLOWED_ORIGINS: ${CDNLITE_CORS_ALLOWED_ORIGINS}
      CDNLITE_BOOTSTRAP_ADMIN_USER: ${CDNLITE_BOOTSTRAP_ADMIN_USER}
      CDNLITE_BOOTSTRAP_ADMIN_USERNAME: ${CDNLITE_BOOTSTRAP_ADMIN_USERNAME}
      CDNLITE_BOOTSTRAP_ADMIN_PASSWORD: ${CDNLITE_BOOTSTRAP_ADMIN_PASSWORD}
      CDNLITE_BOOTSTRAP_ADMIN_DISPLAY_NAME: ${CDNLITE_BOOTSTRAP_ADMIN_DISPLAY_NAME}
      CDNLITE_READINESS_SNAPSHOT_MAX_AGE_SECONDS: ${CDNLITE_READINESS_SNAPSHOT_MAX_AGE_SECONDS}
    ports:
      - "${CORE_HOST_PORT}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null 2>&1 || exit 1"]
      interval: 2s
      timeout: 2s
      retries: 60
    networks:
      - cdnlite-internal
      - default

  ssl-scheduler:
    image: ghcr.io/${REGISTRY_OWNER}/cdnlite-core:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      CDNLITE_SSL_SECRET_KEY: ${CDNLITE_SSL_SECRET_KEY}
      CDNLITE_ACME_DIRECTORY_URL: ${CDNLITE_ACME_DIRECTORY_URL}
      CDNLITE_ACME_CONTACT_EMAIL: ${CDNLITE_ACME_CONTACT_EMAIL}
      CDNLITE_ACME_DNS_PROPAGATION_SECONDS: ${CDNLITE_ACME_DNS_PROPAGATION_SECONDS}
      CDNLITE_ACME_POLL_ATTEMPTS: ${CDNLITE_ACME_POLL_ATTEMPTS}
      CDNLITE_SCHEDULER_IDLE: ${CDNLITE_SCHEDULER_IDLE}
    command: ["sh", "-c", "if [ \"$${CDNLITE_SCHEDULER_IDLE:-0}\" = \"1\" ]; then echo 'ssl scheduler idle'; tail -f /dev/null; fi; while true; do php artisan cdn:ssl:renew-due || true; sleep 3600; done"]
    networks:
      - cdnlite-internal

  origin-health-scheduler:
    image: ghcr.io/${REGISTRY_OWNER}/cdnlite-core:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      CDNLITE_SCHEDULER_IDLE: ${CDNLITE_SCHEDULER_IDLE}
    command: ["sh", "-c", "if [ \"$${CDNLITE_SCHEDULER_IDLE:-0}\" = \"1\" ]; then echo 'origin health scheduler idle'; tail -f /dev/null; fi; while true; do php artisan cdn:origins:health-check || true; sleep 30; done"]
    networks:
      - cdnlite-internal

  edge:
    image: ghcr.io/${REGISTRY_OWNER}/cdnlite-edge:latest
    restart: unless-stopped
    depends_on:
      core:
        condition: service_healthy
    volumes:
      - cdnlite-edge-data:/var/lib/cdnlite
    ports:
      - "${EDGE_HOST_PORT}:8081"
      - "${EDGE_TLS_HOST_PORT}:8443"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8081/health >/dev/null 2>&1 || exit 1"]
      interval: 2s
      timeout: 2s
      retries: 60
    environment:
      EDGE_ID: ${EDGE_ID}
      EDGE_REGION: ${EDGE_REGION}
      DEV_MODE: ${DEV_MODE}
      CDNLITE_CACHE_DEFAULT_TTL: ${CDNLITE_CACHE_DEFAULT_TTL}
      EDGE_CONFIG_MAX_STALE_SECONDS: ${EDGE_CONFIG_MAX_STALE_SECONDS}
      EDGE_SYNC_STATUS_PATH: ${EDGE_SYNC_STATUS_PATH}
      SECURITY_EVENT_PATH: ${SECURITY_EVENT_PATH}

  edge-agent:
    image: ghcr.io/${REGISTRY_OWNER}/cdnlite-edge-agent:latest
    restart: unless-stopped
    depends_on:
      edge:
        condition: service_healthy
    environment:
      CORE_URL: ${CORE_URL}
      EDGE_ID: ${EDGE_ID}
      DEV_MODE: ${DEV_MODE}
      EDGE_HOSTNAME: ${EDGE_HOSTNAME}
      EDGE_PUBLIC_IP: ${EDGE_PUBLIC_IP}
      EDGE_REGION: ${EDGE_REGION}
      EDGE_VERSION: ${EDGE_VERSION}
      EDGE_TOKEN: ${EDGE_TOKEN}
      EDGE_CONFIG_PATH: ${EDGE_CONFIG_PATH}
      EDGE_CONFIG_CACHE_PATH: ${EDGE_CONFIG_CACHE_PATH}
      EDGE_SYNC_STATUS_PATH: ${EDGE_SYNC_STATUS_PATH}
      EDGE_CONFIG_MAX_STALE_SECONDS: ${EDGE_CONFIG_MAX_STALE_SECONDS}
      METRIC_PATH: ${METRIC_PATH}
      SECURITY_EVENT_PATH: ${SECURITY_EVENT_PATH}
      EDGE_AGENT_IDLE: ${EDGE_AGENT_IDLE}
    volumes:
      - cdnlite-edge-data:/var/lib/cdnlite

  dashboard:
    image: ghcr.io/${REGISTRY_OWNER}/cdnlite-core:latest
    restart: unless-stopped
    depends_on:
      core:
        condition: service_started
      edge:
        condition: service_started
    environment:
      VITE_CDNLITE_CORE_URL: ${VITE_CDNLITE_CORE_URL}
      VITE_CDNLITE_EDGE_URL: ${VITE_CDNLITE_EDGE_URL}
      VITE_CDNLITE_APP_NAME: ${VITE_CDNLITE_APP_NAME}
      VITE_CDNLITE_API_TOKEN: ${VITE_CDNLITE_API_TOKEN}
      VITE_ENABLE_EDGE_DEV_TOOLS: ${VITE_ENABLE_EDGE_DEV_TOOLS}
      VITE_ENABLE_USAGE_SIMULATOR: ${VITE_ENABLE_USAGE_SIMULATOR}
      VITE_ENABLE_SSL_TOOLS: ${VITE_ENABLE_SSL_TOOLS}
      VITE_ENABLE_SECURITY_EVENT_VIEWER: ${VITE_ENABLE_SECURITY_EVENT_VIEWER}
      VITE_ENABLE_LOG_VIEWER: ${VITE_ENABLE_LOG_VIEWER}
      VITE_DEFAULT_USAGE_BUCKET: ${VITE_DEFAULT_USAGE_BUCKET}
      VITE_DASHBOARD_REFRESH_SECONDS: ${VITE_DASHBOARD_REFRESH_SECONDS}
      VITE_REQUEST_TIMEOUT_MS: ${VITE_REQUEST_TIMEOUT_MS}
    ports:
      - "${DASHBOARD_PORT}:80"

networks:
  cdnlite-internal:
    driver: bridge
    internal: true

volumes:
  pgdata:
  cdnlite-edge-data:
