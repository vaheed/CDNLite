services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 2s
      timeout: 2s
      retries: 30
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      cdnlite-internal:
        aliases:
          - postgres

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 30
    volumes:
      - redisdata:/data
    networks:
      - cdnlite-internal

  core:
    image: ghcr.io/${REGISTRY_OWNER}/cdnlite-core:${IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      APP_ENV: ${APP_ENV}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION}
      CACHE_STORE: ${CACHE_STORE}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      HORIZON_PREFIX: ${HORIZON_PREFIX}
      PHP_FPM_PM_MAX_CHILDREN: ${PHP_FPM_PM_MAX_CHILDREN}
      PHP_FPM_PM_START_SERVERS: ${PHP_FPM_PM_START_SERVERS}
      PHP_FPM_PM_MIN_SPARE_SERVERS: ${PHP_FPM_PM_MIN_SPARE_SERVERS}
      PHP_FPM_PM_MAX_SPARE_SERVERS: ${PHP_FPM_PM_MAX_SPARE_SERVERS}
      PHP_FPM_PM_MAX_REQUESTS: ${PHP_FPM_PM_MAX_REQUESTS}
      APP_LOG_ENABLED: ${APP_LOG_ENABLED}
      APP_LOG_LEVEL: ${APP_LOG_LEVEL}
      APP_DEBUG: ${APP_DEBUG}
      CDNLITE_API_TOKEN: ${CDNLITE_API_TOKEN}
      CDNLITE_ORIGIN_SHIELD_SECRET: ${CDNLITE_ORIGIN_SHIELD_SECRET}
      CDNLITE_CONFIG_SNAPSHOT_KEEP_LAST: ${CDNLITE_CONFIG_SNAPSHOT_KEEP_LAST}
      CDNLITE_CONFIG_SNAPSHOT_PRUNE_BATCH_SIZE: ${CDNLITE_CONFIG_SNAPSHOT_PRUNE_BATCH_SIZE}
      CDNLITE_CONFIG_SNAPSHOT_HISTORY_ENABLED: ${CDNLITE_CONFIG_SNAPSHOT_HISTORY_ENABLED}
      CDNLITE_BOOTSTRAP_EDGE_TOKEN: ${CDNLITE_BOOTSTRAP_EDGE_TOKEN}
      CDNLITE_BOOTSTRAP_EDGE_ID: ${CDNLITE_BOOTSTRAP_EDGE_ID}
      CDNLITE_BOOTSTRAP_EDGE_TOKEN_VALUE: ${CDNLITE_BOOTSTRAP_EDGE_TOKEN_VALUE}
      EDGE_ID: ${EDGE_ID}
      EDGE_TOKEN: ${EDGE_TOKEN}
      CDNLITE_CDN_ZONE: ${CDNLITE_CDN_ZONE}
      CDNLITE_CDN_PROXY_HOST: ${CDNLITE_CDN_PROXY_HOST}
      CDNLITE_EDGE_TTL: ${CDNLITE_EDGE_TTL}
      CDNLITE_EDGE_HEALTH_MODE: ${CDNLITE_EDGE_HEALTH_MODE}
      CDNLITE_EDGE_HEALTH_PORT: ${CDNLITE_EDGE_HEALTH_PORT}
      CDNLITE_EDGE_HEALTH_URL: ${CDNLITE_EDGE_HEALTH_URL}
      CDNLITE_EDGE_HEALTH_TIMEOUT: ${CDNLITE_EDGE_HEALTH_TIMEOUT}
      CDNLITE_EDGE_HEALTH_INTERVAL: ${CDNLITE_EDGE_HEALTH_INTERVAL}
      CDNLITE_EDGE_HEALTH_MIN_FAILURES: ${CDNLITE_EDGE_HEALTH_MIN_FAILURES}
      CDNLITE_EDGE_SELECTOR: ${CDNLITE_EDGE_SELECTOR}
      CDNLITE_EDGE_BACKUP_SELECTOR: ${CDNLITE_EDGE_BACKUP_SELECTOR}
      CDNLITE_GEO_DEFAULT_POLICY: ${CDNLITE_GEO_DEFAULT_POLICY}
      CDNLITE_GEO_ENABLE_COUNTRY_RULES: ${CDNLITE_GEO_ENABLE_COUNTRY_RULES}
      CDNLITE_GEO_ENABLE_CONTINENT_RULES: ${CDNLITE_GEO_ENABLE_CONTINENT_RULES}
      CDNLITE_GEO_ENABLE_REGION_RULES: ${CDNLITE_GEO_ENABLE_REGION_RULES}
      CDNLITE_NS1_IP: ${CDNLITE_NS1_IP}
      CDNLITE_NS2_IP: ${CDNLITE_NS2_IP}
      CDNLITE_BOOTSTRAP_EDGE_DNS: ${CDNLITE_BOOTSTRAP_EDGE_DNS}
      CDNLITE_SSL_SECRET_KEY: ${CDNLITE_SSL_SECRET_KEY}
      CDNLITE_ACME_DIRECTORY_URL: ${CDNLITE_ACME_DIRECTORY_URL}
      CDNLITE_ACME_CONTACT_EMAIL: ${CDNLITE_ACME_CONTACT_EMAIL}
      CDNLITE_ACME_DNS_PROPAGATION_SECONDS: ${CDNLITE_ACME_DNS_PROPAGATION_SECONDS}
      CDNLITE_ACME_DNS_VERIFY_ATTEMPTS: ${CDNLITE_ACME_DNS_VERIFY_ATTEMPTS}
      CDNLITE_ACME_DNS_VERIFY_INTERVAL_SECONDS: ${CDNLITE_ACME_DNS_VERIFY_INTERVAL_SECONDS}
      CDNLITE_ACME_POLL_ATTEMPTS: ${CDNLITE_ACME_POLL_ATTEMPTS}
      CDNLITE_ADMIN_SESSION_TTL_SECONDS: ${CDNLITE_ADMIN_SESSION_TTL_SECONDS}
      CDNLITE_CORS_ALLOWED_ORIGINS: ${CDNLITE_CORS_ALLOWED_ORIGINS}
      CDNLITE_DEV_ADMIN_USERNAME: ${CDNLITE_DEV_ADMIN_USERNAME}
      CDNLITE_DEV_ADMIN_PASSWORD: ${CDNLITE_DEV_ADMIN_PASSWORD}
      CDNLITE_READINESS_SNAPSHOT_MAX_AGE_SECONDS: ${CDNLITE_READINESS_SNAPSHOT_MAX_AGE_SECONDS}
      CDNLITE_SCHEDULER_IDLE: ${CDNLITE_SCHEDULER_IDLE}
      CDNLITE_SCHEDULER_TICK_SECONDS: ${CDNLITE_SCHEDULER_TICK_SECONDS}
      CDNLITE_SCHEDULER_STATE_PATH: ${CDNLITE_SCHEDULER_STATE_PATH}
      CDNLITE_NAMESERVER_CHECK_INTERVAL_SECONDS: ${CDNLITE_NAMESERVER_CHECK_INTERVAL_SECONDS}
      CDNLITE_SYNC_INTERVAL_SECONDS: ${CDNLITE_SYNC_INTERVAL_SECONDS}
      CDNLITE_RETENTION_PRUNE_ENABLED: ${CDNLITE_RETENTION_PRUNE_ENABLED}
      CDNLITE_RETENTION_INTERVAL_SECONDS: ${CDNLITE_RETENTION_INTERVAL_SECONDS}
      CDNLITE_RETENTION_BATCH_SIZE: ${CDNLITE_RETENTION_BATCH_SIZE}
      CDNLITE_ANALYTICS_RETENTION_DAYS: ${CDNLITE_ANALYTICS_RETENTION_DAYS}
      CDNLITE_SECURITY_EVENT_RETENTION_DAYS: ${CDNLITE_SECURITY_EVENT_RETENTION_DAYS}
      CDNLITE_DNS_EVENT_RETENTION_DAYS: ${CDNLITE_DNS_EVENT_RETENTION_DAYS}
      CDNLITE_SSL_JOB_RETENTION_DAYS: ${CDNLITE_SSL_JOB_RETENTION_DAYS}
      CDNLITE_INGEST_KEY_RETENTION_DAYS: ${CDNLITE_INGEST_KEY_RETENTION_DAYS}
      TELEMETRY_MAX_BATCH_ITEMS: ${TELEMETRY_MAX_BATCH_ITEMS}
      TELEMETRY_MAX_PAYLOAD_BYTES: ${TELEMETRY_MAX_PAYLOAD_BYTES}
    ports:
      - "${CORE_HOST_PORT}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null 2>&1 || exit 1"]
      interval: 2s
      timeout: 2s
      retries: 60
    networks:
      - cdnlite-internal
      - default

  edge:
    image: ghcr.io/${REGISTRY_OWNER}/cdnlite-edge:${IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      core:
        condition: service_healthy
    volumes:
      - cdnlite-edge-data:/var/lib/cdnlite
    ports:
      - "${EDGE_HOST_PORT}:8081"
      - "${EDGE_TLS_HOST_PORT}:8443"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8081/health >/dev/null 2>&1 || exit 1"]
      interval: 2s
      timeout: 2s
      retries: 60
    environment:
      EDGE_ID: ${EDGE_ID}
      EDGE_REGION: ${EDGE_REGION}
      DEV_MODE: ${DEV_MODE}
      CDNLITE_CACHE_DEFAULT_TTL: ${CDNLITE_CACHE_DEFAULT_TTL}
      METRIC_PATH: ${METRIC_PATH}
      EDGE_CONFIG_MAX_STALE_SECONDS: ${EDGE_CONFIG_MAX_STALE_SECONDS}
      EDGE_SYNC_STATUS_PATH: ${EDGE_SYNC_STATUS_PATH}
      SECURITY_EVENT_PATH: ${SECURITY_EVENT_PATH}
      CDNLITE_EDGE_WORKER_PROCESSES: ${CDNLITE_EDGE_WORKER_PROCESSES}
      CDNLITE_EDGE_WORKER_CONNECTIONS: ${CDNLITE_EDGE_WORKER_CONNECTIONS}
      CDNLITE_EDGE_LIMITS_DICT_SIZE: ${CDNLITE_EDGE_LIMITS_DICT_SIZE}
      CDNLITE_EDGE_REQUEST_CONTEXT_DICT_SIZE: ${CDNLITE_EDGE_REQUEST_CONTEXT_DICT_SIZE}
      CDNLITE_EDGE_METRIC_QUEUE_DICT_SIZE: ${CDNLITE_EDGE_METRIC_QUEUE_DICT_SIZE}
      CDNLITE_EDGE_SECURITY_EVENT_QUEUE_DICT_SIZE: ${CDNLITE_EDGE_SECURITY_EVENT_QUEUE_DICT_SIZE}
      CDNLITE_EDGE_CONFIG_MAX_BYTES: ${CDNLITE_EDGE_CONFIG_MAX_BYTES}
      CDNLITE_EDGE_CONFIG_REFRESH_SECONDS: ${CDNLITE_EDGE_CONFIG_REFRESH_SECONDS}
      CDNLITE_EDGE_TELEMETRY_BATCH_SIZE: ${CDNLITE_EDGE_TELEMETRY_BATCH_SIZE}
      CDNLITE_EDGE_TELEMETRY_FLUSH_INTERVAL_SECONDS: ${CDNLITE_EDGE_TELEMETRY_FLUSH_INTERVAL_SECONDS}
      CDNLITE_EDGE_TELEMETRY_QUEUE_MAX_ITEMS: ${CDNLITE_EDGE_TELEMETRY_QUEUE_MAX_ITEMS}
      CDNLITE_EDGE_TELEMETRY_QUEUE_MAX_BYTES: ${CDNLITE_EDGE_TELEMETRY_QUEUE_MAX_BYTES}
      CDNLITE_EDGE_RESOLVER: ${CDNLITE_EDGE_RESOLVER}
      CDNLITE_EDGE_CLIENT_HEADER_BUFFER_SIZE: ${CDNLITE_EDGE_CLIENT_HEADER_BUFFER_SIZE}
      CDNLITE_EDGE_LARGE_CLIENT_HEADER_BUFFERS: ${CDNLITE_EDGE_LARGE_CLIENT_HEADER_BUFFERS}
      CDNLITE_EDGE_CLIENT_BODY_BUFFER_SIZE: ${CDNLITE_EDGE_CLIENT_BODY_BUFFER_SIZE}
      CDNLITE_EDGE_CLIENT_MAX_BODY_SIZE: ${CDNLITE_EDGE_CLIENT_MAX_BODY_SIZE}
      CDNLITE_EDGE_PROXY_CONNECT_TIMEOUT: ${CDNLITE_EDGE_PROXY_CONNECT_TIMEOUT}
      CDNLITE_EDGE_PROXY_READ_TIMEOUT: ${CDNLITE_EDGE_PROXY_READ_TIMEOUT}
      CDNLITE_EDGE_PROXY_SEND_TIMEOUT: ${CDNLITE_EDGE_PROXY_SEND_TIMEOUT}

  edge-agent:
    image: ghcr.io/${REGISTRY_OWNER}/cdnlite-edge-agent:${IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      edge:
        condition: service_healthy
    environment:
      CORE_URL: ${CORE_URL}
      EDGE_ID: ${EDGE_ID}
      DEV_MODE: ${DEV_MODE}
      EDGE_HOSTNAME: ${EDGE_HOSTNAME}
      EDGE_PUBLIC_IP: ${EDGE_PUBLIC_IP}
      EDGE_REGION: ${EDGE_REGION}
      EDGE_COUNTRY: ${EDGE_COUNTRY}
      EDGE_CONTINENT: ${EDGE_CONTINENT}
      EDGE_VERSION: ${EDGE_VERSION}
      EDGE_TOKEN: ${EDGE_TOKEN}
      EDGE_CONFIG_PATH: ${EDGE_CONFIG_PATH}
      EDGE_CONFIG_CACHE_PATH: ${EDGE_CONFIG_CACHE_PATH}
      EDGE_SYNC_STATUS_PATH: ${EDGE_SYNC_STATUS_PATH}
      EDGE_CONFIG_MAX_STALE_SECONDS: ${EDGE_CONFIG_MAX_STALE_SECONDS}
      METRIC_PATH: ${METRIC_PATH}
      SECURITY_EVENT_PATH: ${SECURITY_EVENT_PATH}
      EDGE_AGENT_IDLE: ${EDGE_AGENT_IDLE}
    volumes:
      - cdnlite-edge-data:/var/lib/cdnlite

  dashboard:
    image: ghcr.io/${REGISTRY_OWNER}/cdnlite-dashboard:${IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      core:
        condition: service_started
      edge:
        condition: service_started
    ports:
      - "${DASHBOARD_PORT}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 12

networks:
  cdnlite-internal:
    driver: bridge
    internal: true

volumes:
  pgdata:
  redisdata:
  cdnlite-edge-data:
