worker_processes 1;
error_log /var/log/openresty/error.log info;
pid /tmp/nginx.pid;

events { worker_connections 1024; }

http {
  lua_package_path '/etc/openresty/lua/?.lua;;';
  access_log /var/log/openresty/access.log;
  resolver 127.0.0.11 ipv6=off;

  server {
    listen 8081;
    proxy_intercept_errors on;
    error_page 500 502 503 504 /__cdnlite_error_page;

    location = /health {
      default_type application/json;
      return 200 '{"ok":true}';
    }

    location = /__cdnlite_error_page {
      internal;
      default_type text/html;
      content_by_lua_block {
        local page = require('error_page')
        page.render(tonumber(ngx.var.status) or 502)
      }
    }

    location / {
      set $target_upstream '';

      access_by_lua_block {
        local router = require('router')
        local ok, err = router.handle()
        if not ok then
          ngx.status = 502
          ngx.ctx.router_error = err or 'unknown'
          return ngx.exit(502)
        end
      }

      header_filter_by_lua_block {
        local metrics = require('metrics')
        metrics.on_header()
      }

      log_by_lua_block {
        local metrics = require('metrics')
        metrics.on_log()
      }

      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass $target_upstream;
    }
  }
}
