worker_processes 1;
env EDGE_ID;
env CDNLITE_EDGE_LOG_FORMAT;
env CDNLITE_EDGE_LOG_LEVEL;
env CDNLITE_EDGE_DEBUG_HEADERS;
env CDNLITE_EDGE_LOG_REQUEST_BODY;
error_log /dev/stderr __CDNLITE_EDGE_ERROR_LOG_LEVEL__;
pid /tmp/nginx.pid;

events { worker_connections 1024; }

http {
  server_tokens off;
  more_clear_headers Server;
  lua_package_path '/etc/openresty/lua/?.lua;;';
  lua_shared_dict cdnlite_limits 10m;
  resolver 127.0.0.11 ipv6=off;
  lua_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
  lua_ssl_verify_depth 5;
  proxy_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
  proxy_ssl_verify_depth 5;
  proxy_cache_path /var/cache/cdnlite levels=1:2 keys_zone=cdnlite_cache:10m max_size=256m inactive=60m use_temp_path=off;
  log_format cdnlite_json escape=json
    '{'
    '"ts":"$time_iso8601",'
    '"request_id":"$request_id",'
    '"remote_addr":"$remote_addr",'
    '"host":"$host",'
    '"method":"$request_method",'
    '"uri":"$uri",'
    '"status":$status,'
    '"bytes_sent":$bytes_sent,'
    '"request_time":$request_time,'
    '"upstream_status":"$upstream_status",'
    '"upstream_response_time":"$upstream_response_time",'
    '"upstream_addr":"$upstream_addr",'
    '"cache_status":"$upstream_cache_status",'
    '"origin_id":"$target_origin_id",'
    '"edge_node_id":"$hostname"'
    '}';
  access_log /dev/stdout __CDNLITE_EDGE_ACCESS_LOG_FORMAT__;

  server {
    listen 8081;
    proxy_intercept_errors on;
    error_page 500 502 503 504 /__cdnlite_error_page;
    set $target_upstream '';
    set $target_backup_upstream '';
    set $target_origin_host_header '';
    set $target_origin_sni '';
    set $target_origin_id '';
    set $target_origin_host '';
    set $target_domain_id '';
    set $target_origin_tls_verify 'verify';
    set $target_backup_origin_host_header '';
    set $target_backup_origin_sni '';
    set $target_backup_origin_id '';
    set $target_backup_origin_host '';
    set $target_backup_origin_tls_verify 'verify';
    set $cdnlite_cache_bypass 0;
    set $cdnlite_cache_no_store 0;
    set $cdnlite_cache_key "$scheme|$host|$request_uri|$http_accept_encoding|$http_x_cdnlite_country|$http_cf_ipcountry";

    location = /health {
      default_type application/json;
      return 200 '{"ok":true}';
    }

    location = /ready {
      default_type application/json;
      content_by_lua_block {
        local loader = require('config_loader')
        local cjson = require('cjson.safe')
        local ok, err, status = loader.ready()
        if not ok then
          ngx.status = 503
          ngx.say('{"ok":false,"error":"' .. (err or 'not_ready') .. '"}')
          return
        end
        ngx.say(cjson.encode({ ok = true, status = status }))
      }
    }

    location = /__cdnlite_error_page {
      internal;
      default_type text/html;
      content_by_lua_block {
        local page = require('error_page')
        page.render(tonumber(ngx.var.status) or 502)
      }
    }

    location / {
      access_by_lua_block {
        local router = require('router')
        local ok, err = router.handle()
        if not ok then
          ngx.status = 502
          ngx.ctx.router_error = err or 'unknown'
          return ngx.exit(502)
        end
        if ngx.var.target_origin_tls_verify == 'ignore' then
          return ngx.exec('@cdnlite_noverify')
        end
      }

      header_filter_by_lua_block {
        local metrics = require('metrics')
        metrics.on_header()
        local header_rules = require('header_rules')
        header_rules.apply()
      }

      log_by_lua_block {
        local metrics = require('metrics')
        metrics.on_log()
      }

      proxy_cache cdnlite_cache;
      proxy_cache_key $cdnlite_cache_key;
      proxy_cache_methods GET HEAD;
      proxy_cache_valid 200 301 302 __CDNLITE_CACHE_DEFAULT_TTL__;
      proxy_cache_bypass $cdnlite_cache_bypass;
      proxy_no_cache $cdnlite_cache_no_store;
      proxy_cache_use_stale error timeout http_500 http_502 http_503 http_504;
      proxy_cache_lock on;
      error_page 502 503 504 = @cdnlite_backup;

      proxy_set_header Host $target_origin_host_header;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-CDNLITE-Client-IP $remote_addr;
      proxy_ssl_server_name on;
      proxy_ssl_verify on;
      proxy_ssl_name $target_origin_sni;
      proxy_pass $target_upstream;
    }

    location @cdnlite_noverify {
      header_filter_by_lua_block {
        local metrics = require('metrics')
        metrics.on_header()
        local header_rules = require('header_rules')
        header_rules.apply()
      }

      log_by_lua_block {
        local metrics = require('metrics')
        metrics.on_log()
      }

      proxy_cache cdnlite_cache;
      proxy_cache_key $cdnlite_cache_key;
      proxy_cache_methods GET HEAD;
      proxy_cache_valid 200 301 302 __CDNLITE_CACHE_DEFAULT_TTL__;
      proxy_cache_bypass $cdnlite_cache_bypass;
      proxy_no_cache $cdnlite_cache_no_store;
      proxy_cache_use_stale error timeout http_500 http_502 http_503 http_504;
      proxy_cache_lock on;
      error_page 502 503 504 = @cdnlite_backup;

      proxy_set_header Host $target_origin_host_header;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-CDNLITE-Client-IP $remote_addr;
      proxy_ssl_server_name on;
      proxy_ssl_verify off;
      proxy_ssl_name $target_origin_sni;
      proxy_pass $target_upstream;
    }

    location @cdnlite_backup {
      recursive_error_pages on;
      error_page 502 503 504 /__cdnlite_error_page;
      access_by_lua_block {
        if ngx.var.target_backup_upstream == '' then
          ngx.ctx.router_error = 'primary_origin_unavailable'
          require('error_page').render(502)
          return ngx.exit(502)
        end
        ngx.var.target_origin_host_header = ngx.var.target_backup_origin_host_header
        ngx.var.target_origin_sni = ngx.var.target_backup_origin_sni
        ngx.var.target_origin_id = ngx.var.target_backup_origin_id
        ngx.var.target_origin_host = ngx.var.target_backup_origin_host
        ngx.var.target_origin_tls_verify = ngx.var.target_backup_origin_tls_verify
        ngx.ctx.origin = ngx.ctx.backup_origin or ngx.ctx.origin
        if ngx.var.target_origin_tls_verify == 'ignore' then
          return ngx.exec('@cdnlite_backup_noverify')
        end
      }
      header_filter_by_lua_block {
        local identity = require('identity')
        identity.apply()
        ngx.header['X-CDNLITE-Origin'] = 'backup'
      }
      proxy_set_header Host $target_origin_host_header;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-CDNLITE-Client-IP $remote_addr;
      proxy_ssl_server_name on;
      proxy_ssl_verify on;
      proxy_ssl_name $target_origin_sni;
      proxy_pass $target_backup_upstream;
    }

    location @cdnlite_backup_noverify {
      recursive_error_pages on;
      error_page 502 503 504 /__cdnlite_error_page;
      header_filter_by_lua_block {
        local identity = require('identity')
        identity.apply()
        ngx.header['X-CDNLITE-Origin'] = 'backup'
      }
      proxy_set_header Host $target_origin_host_header;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-CDNLITE-Client-IP $remote_addr;
      proxy_ssl_server_name on;
      proxy_ssl_verify off;
      proxy_ssl_name $target_origin_sni;
      proxy_pass $target_backup_upstream;
    }
  }

  server {
    listen 8443 ssl;
    ssl_certificate /var/lib/cdnlite/tls/default.crt;
    ssl_certificate_key /var/lib/cdnlite/tls/default.key;
    ssl_certificate_by_lua_block {
      local tls = require('tls_cert')
      tls.apply()
    }
    proxy_intercept_errors on;
    error_page 500 502 503 504 /__cdnlite_error_page;
    set $target_upstream '';
    set $target_backup_upstream '';
    set $target_origin_host_header '';
    set $target_origin_sni '';
    set $target_origin_id '';
    set $target_origin_host '';
    set $target_domain_id '';
    set $target_origin_tls_verify 'verify';
    set $target_backup_origin_host_header '';
    set $target_backup_origin_sni '';
    set $target_backup_origin_id '';
    set $target_backup_origin_host '';
    set $target_backup_origin_tls_verify 'verify';
    set $cdnlite_cache_bypass 0;
    set $cdnlite_cache_no_store 0;
    set $cdnlite_cache_key "$scheme|$host|$request_uri|$http_accept_encoding|$http_x_cdnlite_country|$http_cf_ipcountry";

    location = /__cdnlite_error_page {
      internal;
      default_type text/html;
      content_by_lua_block {
        local page = require('error_page')
        page.render(tonumber(ngx.var.status) or 502)
      }
    }

    location / {
      access_by_lua_block {
        local router = require('router')
        local ok, err = router.handle()
        if not ok then
          ngx.status = 502
          ngx.ctx.router_error = err or 'unknown'
          return ngx.exit(502)
        end
        if ngx.var.target_origin_tls_verify == 'ignore' then
          return ngx.exec('@cdnlite_tls_noverify')
        end
      }
      header_filter_by_lua_block {
        local metrics = require('metrics')
        metrics.on_header()
        local header_rules = require('header_rules')
        header_rules.apply()
      }
      log_by_lua_block {
        local metrics = require('metrics')
        metrics.on_log()
      }
      proxy_cache cdnlite_cache;
      proxy_cache_key $cdnlite_cache_key;
      proxy_cache_methods GET HEAD;
      proxy_cache_valid 200 301 302 __CDNLITE_CACHE_DEFAULT_TTL__;
      proxy_cache_bypass $cdnlite_cache_bypass;
      proxy_no_cache $cdnlite_cache_no_store;
      proxy_cache_use_stale error timeout http_500 http_502 http_503 http_504;
      proxy_cache_lock on;
      error_page 502 503 504 = @cdnlite_tls_backup;
      proxy_set_header Host $target_origin_host_header;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-CDNLITE-Client-IP $remote_addr;
      proxy_ssl_server_name on;
      proxy_ssl_verify on;
      proxy_ssl_name $target_origin_sni;
      proxy_pass $target_upstream;
    }

    location @cdnlite_tls_noverify {
      header_filter_by_lua_block {
        local metrics = require('metrics')
        metrics.on_header()
        local header_rules = require('header_rules')
        header_rules.apply()
      }
      log_by_lua_block {
        local metrics = require('metrics')
        metrics.on_log()
      }
      proxy_cache cdnlite_cache;
      proxy_cache_key $cdnlite_cache_key;
      proxy_cache_methods GET HEAD;
      proxy_cache_valid 200 301 302 __CDNLITE_CACHE_DEFAULT_TTL__;
      proxy_cache_bypass $cdnlite_cache_bypass;
      proxy_no_cache $cdnlite_cache_no_store;
      proxy_cache_use_stale error timeout http_500 http_502 http_503 http_504;
      proxy_cache_lock on;
      error_page 502 503 504 = @cdnlite_tls_backup;
      proxy_set_header Host $target_origin_host_header;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-CDNLITE-Client-IP $remote_addr;
      proxy_ssl_server_name on;
      proxy_ssl_verify off;
      proxy_ssl_name $target_origin_sni;
      proxy_pass $target_upstream;
    }

    location @cdnlite_tls_backup {
      recursive_error_pages on;
      error_page 502 503 504 /__cdnlite_error_page;
      access_by_lua_block {
        if ngx.var.target_backup_upstream == '' then
          ngx.ctx.router_error = 'primary_origin_unavailable'
          require('error_page').render(502)
          return ngx.exit(502)
        end
        ngx.var.target_origin_host_header = ngx.var.target_backup_origin_host_header
        ngx.var.target_origin_sni = ngx.var.target_backup_origin_sni
        ngx.var.target_origin_id = ngx.var.target_backup_origin_id
        ngx.var.target_origin_host = ngx.var.target_backup_origin_host
        ngx.var.target_origin_tls_verify = ngx.var.target_backup_origin_tls_verify
        ngx.ctx.origin = ngx.ctx.backup_origin or ngx.ctx.origin
        if ngx.var.target_origin_tls_verify == 'ignore' then
          return ngx.exec('@cdnlite_tls_backup_noverify')
        end
      }
      header_filter_by_lua_block {
        local identity = require('identity')
        identity.apply()
        ngx.header['X-CDNLITE-Origin'] = 'backup'
      }
      proxy_set_header Host $target_origin_host_header;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-CDNLITE-Client-IP $remote_addr;
      proxy_ssl_server_name on;
      proxy_ssl_verify on;
      proxy_ssl_name $target_origin_sni;
      proxy_pass $target_backup_upstream;
    }

    location @cdnlite_tls_backup_noverify {
      recursive_error_pages on;
      error_page 502 503 504 /__cdnlite_error_page;
      header_filter_by_lua_block {
        local identity = require('identity')
        identity.apply()
        ngx.header['X-CDNLITE-Origin'] = 'backup'
      }
      proxy_set_header Host $target_origin_host_header;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-CDNLITE-Client-IP $remote_addr;
      proxy_ssl_server_name on;
      proxy_ssl_verify off;
      proxy_ssl_name $target_origin_sni;
      proxy_pass $target_backup_upstream;
    }
  }
}
