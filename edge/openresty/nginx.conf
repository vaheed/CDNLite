worker_processes __CDNLITE_EDGE_WORKER_PROCESSES__;
env EDGE_ID;
env METRIC_PATH;
env SECURITY_EVENT_PATH;
env CDNLITE_EDGE_CONFIG_MAX_BYTES;
env CDNLITE_EDGE_CONFIG_REFRESH_SECONDS;
env CDNLITE_EDGE_TELEMETRY_BATCH_SIZE;
env CDNLITE_EDGE_TELEMETRY_FLUSH_INTERVAL_SECONDS;
env CDNLITE_EDGE_TELEMETRY_QUEUE_MAX_ITEMS;
env CDNLITE_EDGE_TELEMETRY_QUEUE_MAX_BYTES;
env CDNLITE_EDGE_LOG_FORMAT;
env CDNLITE_EDGE_LOG_LEVEL;
env CDNLITE_EDGE_DEBUG_HEADERS;
env CDNLITE_EDGE_LOG_REQUEST_BODY;
env CDNLITE_EDGE_MMDB_FILE;
env CDNLITE_EDGE_CLEARANCE_SECRET;
env CDNLITE_EDGE_CHALLENGE_DIFFICULTY;
env CDNLITE_EDGE_WAITING_ROOM_SECRET;
error_log /dev/stderr __CDNLITE_EDGE_ERROR_LOG_LEVEL__;
pid /tmp/nginx.pid;

events { worker_connections __CDNLITE_EDGE_WORKER_CONNECTIONS__; }

http {
  server_tokens off;
  more_clear_headers Server;
  lua_package_path '/etc/openresty/lua/?.lua;;';
  lua_shared_dict cdnlite_limits __CDNLITE_EDGE_LIMITS_DICT_SIZE__;
  lua_shared_dict cdnlite_request_context __CDNLITE_EDGE_REQUEST_CONTEXT_DICT_SIZE__;
  lua_shared_dict cdnlite_metric_queue __CDNLITE_EDGE_METRIC_QUEUE_DICT_SIZE__;
  lua_shared_dict cdnlite_security_event_queue __CDNLITE_EDGE_SECURITY_EVENT_QUEUE_DICT_SIZE__;
  lua_shared_dict cdnlite_waiting_room __CDNLITE_EDGE_WAITING_ROOM_DICT_SIZE__;
  init_worker_by_lua_block {
    require('config_loader').reload()
    require('telemetry_queue').start()
  }
  resolver __CDNLITE_EDGE_RESOLVER__ ipv6=off valid=30s;
  lua_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
  lua_ssl_verify_depth 5;
  proxy_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
  proxy_ssl_verify_depth 5;
  proxy_cache_path /var/cache/cdnlite levels=1:2 keys_zone=cdnlite_cache:10m max_size=256m inactive=60m use_temp_path=off;
  client_header_buffer_size __CDNLITE_EDGE_CLIENT_HEADER_BUFFER_SIZE__;
  large_client_header_buffers __CDNLITE_EDGE_LARGE_CLIENT_HEADER_BUFFERS__;
  client_body_buffer_size __CDNLITE_EDGE_CLIENT_BODY_BUFFER_SIZE__;
  client_max_body_size __CDNLITE_EDGE_CLIENT_MAX_BODY_SIZE__;
  proxy_connect_timeout __CDNLITE_EDGE_PROXY_CONNECT_TIMEOUT__;
  proxy_read_timeout __CDNLITE_EDGE_PROXY_READ_TIMEOUT__;
  proxy_send_timeout __CDNLITE_EDGE_PROXY_SEND_TIMEOUT__;
  log_format cdnlite_json escape=json
    '{'
    '"ts":"$time_iso8601",'
    '"request_id":"$request_id",'
    '"remote_addr":"$remote_addr",'
    '"host":"$host",'
    '"method":"$request_method",'
    '"uri":"$uri",'
    '"status":$status,'
    '"bytes_sent":$bytes_sent,'
    '"request_time":$request_time,'
    '"upstream_status":"$upstream_status",'
    '"upstream_response_time":"$upstream_response_time",'
    '"upstream_addr":"$upstream_addr",'
    '"cache_status":"$upstream_cache_status",'
    '"origin_id":"$target_origin_id",'
    '"edge_node_id":"$hostname"'
    '}';
  access_log /dev/stdout __CDNLITE_EDGE_ACCESS_LOG_FORMAT__;

  server {
    listen 8081;
    proxy_intercept_errors on;
    error_page 500 502 503 504 /__cdnlite_error_page;
    set $target_upstream '';
    set $target_origin_host_header '';
    set $target_origin_sni '';
    set $target_origin_id '';
    set $target_origin_host '';
    set $target_domain_id '';
    set $target_origin_tls_verify 'ignore';
    set $cdnlite_cache_bypass 0;
    set $cdnlite_cache_no_store 0;
    set $cdnlite_cache_key "$scheme|$host|$request_uri|$http_accept_encoding|DEFAULT";
    set $cdnlite_cache_debug '';
    set $cdnlite_cache_bypass_reason '';

    location = /health {
      default_type application/json;
      return 200 '{"ok":true}';
    }

    location = /ready {
      default_type application/json;
      content_by_lua_block {
        local loader = require('config_loader')
        local telemetry_queue = require('telemetry_queue')
        local cjson = require('cjson.safe')
        local ok, err, status = loader.ready()
        if not ok then
          ngx.status = 503
          ngx.say('{"ok":false,"error":"' .. (err or 'not_ready') .. '"}')
          return
        end
        ngx.say(cjson.encode({ ok = true, status = status, telemetry = telemetry_queue.status() }))
      }
    }

    location = /__cdnlite_reload_config {
      default_type application/json;
      allow 127.0.0.1;
      deny all;
      content_by_lua_block {
        local loader = require('config_loader')
        local cjson = require('cjson.safe')
        loader.reload()
        local ok, err, status = loader.ready()
        ngx.status = ok and 200 or 503
        ngx.say(cjson.encode({ ok = ok, error = err, status = status }))
      }
    }

    location = /__cdnlite_challenge_verify {
      default_type application/json;
      content_by_lua_block {
        require('clearance').verify_challenge()
      }
      log_by_lua_block {
        local metrics = require('metrics')
        metrics.on_log()
        require('waiting_room').on_log()
      }
    }

    location = /.well-known/cdnlite/queue {
      default_type text/html;
      content_by_lua_block {
        require('waiting_room').queue_page()
      }
      log_by_lua_block {
        local metrics = require('metrics')
        metrics.on_log()
        require('waiting_room').on_log()
      }
    }

    location = /.well-known/cdnlite/queue/status {
      default_type application/json;
      content_by_lua_block {
        require('waiting_room').queue_status()
      }
      log_by_lua_block {
        local metrics = require('metrics')
        metrics.on_log()
      }
    }

    location = /__cdnlite_error_page {
      internal;
      default_type text/html;
      content_by_lua_block {
        local page = require('error_page')
        page.render(tonumber(ngx.var.status) or 502)
      }
      log_by_lua_block {
        local metrics = require('metrics')
        metrics.on_log()
      }
    }

    location / {
      access_by_lua_block {
        local router = require('router')
        local ok, err = router.handle()
        if not ok then
          ngx.status = 502
          ngx.ctx.router_error = err or 'unknown'
          return ngx.exit(502)
        end
        if ngx.var.target_origin_tls_verify == 'ignore' then
          return ngx.exec('@cdnlite_noverify')
        end
      }

      header_filter_by_lua_block {
        local metrics = require('metrics')
        metrics.on_header()
        ngx.header['X-CDNLite-Cache'] = ngx.var.cdnlite_cache_bypass == '1' and 'BYPASS' or (ngx.var.upstream_cache_status or 'MISS')
        if ngx.var.cdnlite_cache_bypass_reason ~= '' then ngx.header['X-CDNLite-Cache-Reason'] = ngx.var.cdnlite_cache_bypass_reason end
        if os.getenv('CDNLITE_EDGE_DEBUG_HEADERS') == '1' then ngx.header['X-CDNLite-Cache-Key'] = ngx.var.cdnlite_cache_debug end
        local header_rules = require('header_rules')
        header_rules.apply()
      }

      log_by_lua_block {
        local metrics = require('metrics')
        metrics.on_log()
      }

      proxy_cache cdnlite_cache;
      proxy_cache_key $cdnlite_cache_key;
      proxy_cache_methods GET HEAD;
      proxy_cache_valid 200 301 302 __CDNLITE_CACHE_DEFAULT_TTL__;
      proxy_cache_bypass $cdnlite_cache_bypass;
      proxy_no_cache $cdnlite_cache_no_store;
      proxy_cache_use_stale error timeout http_500 http_502 http_503 http_504;
      proxy_cache_lock on;
      proxy_set_header Host $target_origin_host_header;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-CDNLITE-Client-IP $remote_addr;
      proxy_ssl_server_name on;
      proxy_ssl_verify on;
      proxy_ssl_name $target_origin_sni;
      proxy_pass $target_upstream;
    }

    location @cdnlite_noverify {
      header_filter_by_lua_block {
        local metrics = require('metrics')
        metrics.on_header()
        ngx.header['X-CDNLite-Cache'] = ngx.var.cdnlite_cache_bypass == '1' and 'BYPASS' or (ngx.var.upstream_cache_status or 'MISS')
        if ngx.var.cdnlite_cache_bypass_reason ~= '' then ngx.header['X-CDNLite-Cache-Reason'] = ngx.var.cdnlite_cache_bypass_reason end
        if os.getenv('CDNLITE_EDGE_DEBUG_HEADERS') == '1' then ngx.header['X-CDNLite-Cache-Key'] = ngx.var.cdnlite_cache_debug end
        local header_rules = require('header_rules')
        header_rules.apply()
      }

      log_by_lua_block {
        local metrics = require('metrics')
        metrics.on_log()
      }

      proxy_cache cdnlite_cache;
      proxy_cache_key $cdnlite_cache_key;
      proxy_cache_methods GET HEAD;
      proxy_cache_valid 200 301 302 __CDNLITE_CACHE_DEFAULT_TTL__;
      proxy_cache_bypass $cdnlite_cache_bypass;
      proxy_no_cache $cdnlite_cache_no_store;
      proxy_cache_use_stale error timeout http_500 http_502 http_503 http_504;
      proxy_cache_lock on;
      proxy_set_header Host $target_origin_host_header;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-CDNLITE-Client-IP $remote_addr;
      proxy_ssl_server_name on;
      proxy_ssl_verify off;
      proxy_ssl_name $target_origin_sni;
      proxy_pass $target_upstream;
    }

  }

  server {
    listen 8443 ssl;
    ssl_certificate /var/lib/cdnlite/tls/default.crt;
    ssl_certificate_key /var/lib/cdnlite/tls/default.key;
    ssl_certificate_by_lua_block {
      local tls = require('tls_cert')
      tls.apply()
    }
    proxy_intercept_errors on;
    error_page 500 502 503 504 /__cdnlite_error_page;
    set $target_upstream '';
    set $target_origin_host_header '';
    set $target_origin_sni '';
    set $target_origin_id '';
    set $target_origin_host '';
    set $target_domain_id '';
    set $target_origin_tls_verify 'ignore';
    set $cdnlite_cache_bypass 0;
    set $cdnlite_cache_no_store 0;
    set $cdnlite_cache_key "$scheme|$host|$request_uri|$http_accept_encoding|DEFAULT";
    set $cdnlite_cache_debug '';
    set $cdnlite_cache_bypass_reason '';

    location = /__cdnlite_error_page {
      internal;
      default_type text/html;
      content_by_lua_block {
        local page = require('error_page')
        page.render(tonumber(ngx.var.status) or 502)
      }
      log_by_lua_block {
        local metrics = require('metrics')
        metrics.on_log()
      }
    }

    location = /__cdnlite_challenge_verify {
      default_type application/json;
      content_by_lua_block {
        require('clearance').verify_challenge()
      }
      log_by_lua_block {
        local metrics = require('metrics')
        metrics.on_log()
      }
    }

    location / {
      access_by_lua_block {
        local router = require('router')
        local ok, err = router.handle()
        if not ok then
          ngx.status = 502
          ngx.ctx.router_error = err or 'unknown'
          return ngx.exit(502)
        end
        if ngx.var.target_origin_tls_verify == 'ignore' then
          return ngx.exec('@cdnlite_tls_noverify')
        end
      }
      header_filter_by_lua_block {
        local metrics = require('metrics')
        metrics.on_header()
        ngx.header['X-CDNLite-Cache'] = ngx.var.cdnlite_cache_bypass == '1' and 'BYPASS' or (ngx.var.upstream_cache_status or 'MISS')
        if ngx.var.cdnlite_cache_bypass_reason ~= '' then ngx.header['X-CDNLite-Cache-Reason'] = ngx.var.cdnlite_cache_bypass_reason end
        if os.getenv('CDNLITE_EDGE_DEBUG_HEADERS') == '1' then ngx.header['X-CDNLite-Cache-Key'] = ngx.var.cdnlite_cache_debug end
        local header_rules = require('header_rules')
        header_rules.apply()
      }
      log_by_lua_block {
        local metrics = require('metrics')
        metrics.on_log()
      }
      proxy_cache cdnlite_cache;
      proxy_cache_key $cdnlite_cache_key;
      proxy_cache_methods GET HEAD;
      proxy_cache_valid 200 301 302 __CDNLITE_CACHE_DEFAULT_TTL__;
      proxy_cache_bypass $cdnlite_cache_bypass;
      proxy_no_cache $cdnlite_cache_no_store;
      proxy_cache_use_stale error timeout http_500 http_502 http_503 http_504;
      proxy_cache_lock on;
      proxy_set_header Host $target_origin_host_header;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-CDNLITE-Client-IP $remote_addr;
      proxy_ssl_server_name on;
      proxy_ssl_verify on;
      proxy_ssl_name $target_origin_sni;
      proxy_pass $target_upstream;
    }

    location @cdnlite_tls_noverify {
      header_filter_by_lua_block {
        local metrics = require('metrics')
        metrics.on_header()
        ngx.header['X-CDNLite-Cache'] = ngx.var.cdnlite_cache_bypass == '1' and 'BYPASS' or (ngx.var.upstream_cache_status or 'MISS')
        if ngx.var.cdnlite_cache_bypass_reason ~= '' then ngx.header['X-CDNLite-Cache-Reason'] = ngx.var.cdnlite_cache_bypass_reason end
        if os.getenv('CDNLITE_EDGE_DEBUG_HEADERS') == '1' then ngx.header['X-CDNLite-Cache-Key'] = ngx.var.cdnlite_cache_debug end
        local header_rules = require('header_rules')
        header_rules.apply()
      }
      log_by_lua_block {
        local metrics = require('metrics')
        metrics.on_log()
      }
      proxy_cache cdnlite_cache;
      proxy_cache_key $cdnlite_cache_key;
      proxy_cache_methods GET HEAD;
      proxy_cache_valid 200 301 302 __CDNLITE_CACHE_DEFAULT_TTL__;
      proxy_cache_bypass $cdnlite_cache_bypass;
      proxy_no_cache $cdnlite_cache_no_store;
      proxy_cache_use_stale error timeout http_500 http_502 http_503 http_504;
      proxy_cache_lock on;
      error_page 502 503 504 /__cdnlite_error_page;
      proxy_set_header Host $target_origin_host_header;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-CDNLITE-Client-IP $remote_addr;
      proxy_ssl_server_name on;
      proxy_ssl_verify off;
      proxy_ssl_name $target_origin_sni;
      proxy_pass $target_upstream;
    }

  }
}
