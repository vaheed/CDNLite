services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cdnlite
      POSTGRES_USER: cdnlite
      POSTGRES_PASSWORD: cdnlite
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  core:
    build:
      context: ./core
      dockerfile: Dockerfile
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-local}/cdnlite-core:dev
    depends_on:
      - postgres
    environment:
      DB_DRIVER: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: cdnlite
      DB_USERNAME: cdnlite
      DB_PASSWORD: cdnlite
    ports:
      - "8080:8080"

  edge:
    build:
      context: ./edge
      dockerfile: Dockerfile
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-local}/cdnlite-edge:dev
    depends_on:
      - core
    volumes:
      - ./edge/config:/var/lib/cdnlite

volumes:
  pgdata:
      - ./edge/logs:/var/log/openresty
    ports:
      - "8081:8081"
    environment:
      EDGE_ID: edge-local-1

  edge-agent:
    build:
      context: ./edge
      dockerfile: agent/Dockerfile
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-local}/cdnlite-edge-agent:dev
    depends_on:
      - core
    environment:
      CORE_URL: http://core:8080
      EDGE_ID: edge-local-1
      EDGE_HOSTNAME: edge-local-1
      EDGE_PUBLIC_IP: 127.0.0.1
      EDGE_REGION: local
      EDGE_VERSION: v1
      EDGE_TOKEN: edge-dev-token
      EDGE_CONFIG_PATH: /var/lib/cdnlite/config.json
      METRIC_PATH: /var/lib/cdnlite/metrics.ndjson
    volumes:
      - ./edge/config:/var/lib/cdnlite
