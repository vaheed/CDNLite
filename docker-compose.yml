services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cdnlite}
      POSTGRES_USER: ${POSTGRES_USER:-cdnlite}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cdnlite}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 2s
      timeout: 2s
      retries: 30
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"

  core:
    build:
      context: ./core
      dockerfile: Dockerfile
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-local}/cdnlite-core:dev
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE:-cdnlite}
      DB_USERNAME: ${DB_USERNAME:-cdnlite}
      DB_PASSWORD: ${DB_PASSWORD:-cdnlite}
      POWERDNS_ENABLED: ${POWERDNS_ENABLED:-0}
      POWERDNS_STRICT: ${POWERDNS_STRICT:-0}
      POWERDNS_API_URL: ${POWERDNS_API_URL:-}
      POWERDNS_API_KEY: ${POWERDNS_API_KEY:-}
      POWERDNS_SERVER_ID: ${POWERDNS_SERVER_ID:-localhost}
      POWERDNS_ZONE_NAMESERVERS: ${POWERDNS_ZONE_NAMESERVERS:-ns1.vaheed.net,ns2.vaheed.net}
      CDNLITE_EDGE_BASE_DOMAIN: ${CDNLITE_EDGE_BASE_DOMAIN:-vaheed.net}
      CDNLITE_EDGE_ZONE_PREFIX: ${CDNLITE_EDGE_ZONE_PREFIX:-edge}
      CDNLITE_EDGE_DEFAULT_TARGET: ${CDNLITE_EDGE_DEFAULT_TARGET:-geo}
      CDNLITE_EDGE_TTL: ${CDNLITE_EDGE_TTL:-60}
      CDNLITE_EDGE_HEALTH_MODE: ${CDNLITE_EDGE_HEALTH_MODE:-ifportup}
      CDNLITE_EDGE_HEALTH_PORT: ${CDNLITE_EDGE_HEALTH_PORT:-80}
      CDNLITE_EDGE_HEALTH_URL: ${CDNLITE_EDGE_HEALTH_URL:-/cdn-health}
      CDNLITE_EDGE_HEALTH_TIMEOUT: ${CDNLITE_EDGE_HEALTH_TIMEOUT:-1}
      CDNLITE_EDGE_HEALTH_INTERVAL: ${CDNLITE_EDGE_HEALTH_INTERVAL:-10}
      CDNLITE_EDGE_HEALTH_MIN_FAILURES: ${CDNLITE_EDGE_HEALTH_MIN_FAILURES:-2}
      CDNLITE_EDGE_SELECTOR: ${CDNLITE_EDGE_SELECTOR:-pickclosest}
      CDNLITE_EDGE_BACKUP_SELECTOR: ${CDNLITE_EDGE_BACKUP_SELECTOR:-empty}
      CDNLITE_EDGE_APEX_MODE: ${CDNLITE_EDGE_APEX_MODE:-ALIAS}
      CDNLITE_GEO_DEFAULT_POLICY: ${CDNLITE_GEO_DEFAULT_POLICY:-auto}
      CDNLITE_GEO_ENABLE_COUNTRY_RULES: ${CDNLITE_GEO_ENABLE_COUNTRY_RULES:-true}
      CDNLITE_GEO_ENABLE_CONTINENT_RULES: ${CDNLITE_GEO_ENABLE_CONTINENT_RULES:-true}
      CDNLITE_GEO_ENABLE_REGION_RULES: ${CDNLITE_GEO_ENABLE_REGION_RULES:-true}
      CDNLITE_NS1_IP: ${CDNLITE_NS1_IP:-}
      CDNLITE_NS2_IP: ${CDNLITE_NS2_IP:-}
      CDNLITE_BOOTSTRAP_EDGE_DNS: ${CDNLITE_BOOTSTRAP_EDGE_DNS:-1}
    ports:
      - "${CORE_HOST_PORT:-8080}:8080"

  edge:
    build:
      context: ./edge
      dockerfile: Dockerfile
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-local}/cdnlite-edge:dev
    depends_on:
      - core
    volumes:
      - ${EDGE_CONFIG_DIR:-./edge/config}:/var/lib/cdnlite
      - ./edge/logs:/var/log/openresty
    ports:
      - "${EDGE_HOST_PORT:-8081}:8081"
      - "${EDGE_TLS_HOST_PORT:-8443}:8443"
    environment:
      EDGE_ID: ${EDGE_ID:-edge-local-1}
      EDGE_REGION: ${EDGE_REGION:-local}
      CDNLITE_CACHE_DEFAULT_TTL: ${CDNLITE_CACHE_DEFAULT_TTL:-60s}

  edge-agent:
    build:
      context: ./edge
      dockerfile: agent/Dockerfile
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-local}/cdnlite-edge-agent:dev
    depends_on:
      - core
    environment:
      CORE_URL: ${CORE_URL:-http://core:8080}
      EDGE_ID: ${EDGE_ID:-edge-local-1}
      EDGE_HOSTNAME: ${EDGE_HOSTNAME:-edge-local-1}
      EDGE_PUBLIC_IP: ${EDGE_PUBLIC_IP:-auto}
      EDGE_REGION: ${EDGE_REGION:-local}
      EDGE_VERSION: ${EDGE_VERSION:-v1}
      EDGE_TOKEN: ${EDGE_TOKEN:-edge-dev-token}
      EDGE_CONFIG_PATH: ${EDGE_CONFIG_PATH:-/var/lib/cdnlite/config.json}
      METRIC_PATH: ${METRIC_PATH:-/var/lib/cdnlite/metrics.ndjson}
      EDGE_AGENT_IDLE: ${EDGE_AGENT_IDLE:-0}
    volumes:
      - ${EDGE_CONFIG_DIR:-./edge/config}:/var/lib/cdnlite

  powerdns:
    image: python:3.12-alpine
    profiles: ["powerdns"]
    working_dir: /srv
    command: sh -lc "python /srv/ci/pdns_mock_server.py"
    environment:
      PDNS_API_KEY: ${POWERDNS_API_KEY:-test-key}
      PDNS_PORT: ${PDNS_PORT}
    volumes:
      - ./:/srv
    ports:
      - "${POWERDNS_HOST_PORT}:${PDNS_PORT}"

volumes:
  pgdata:
