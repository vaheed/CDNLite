name: Bug report
description: Report a reproducible problem in CDNLite.
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start stack with ...
        2. Add domain ...
        3. Observe ...
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Core API
        - Dashboard
        - Edge proxy
        - Edge agent
        - DNS/PowerDNS/DNSGeo
        - SSL/ACME
        - Deployment/Compose
        - Documentation
        - Unsure
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Docker version, browser, branch/commit, and topology when relevant.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Remove secrets, tokens, private keys, and customer data before posting.
