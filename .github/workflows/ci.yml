name: cdnt-ci

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cdnlite
          POSTGRES_USER: cdnlite
          POSTGRES_PASSWORD: cdnlite
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cdnlite -d cdnlite"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: cdnlite
      DB_USERNAME: cdnlite
      DB_PASSWORD: cdnlite
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_pgsql

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: PHP lint
        run: |
          find core -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Shell syntax checks
        run: |
          sh -n edge/agent/register.sh
          sh -n edge/agent/heartbeat.sh
          sh -n edge/agent/pull_config.sh
          sh -n edge/agent/push_metrics.sh
          sh -n edge/agent/run.sh

      - name: No WIP markers
        run: |
          ! rg -n "WIP_MARKER" -S core edge ci

      - name: Install test deps
        run: pip install pytest

      - name: Run tests
        run: pytest -q core/tests

  smoke:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and start stack
        run: docker compose up -d --build

      - name: Smoke test
        run: ./ci/smoke.sh

      - name: Logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Teardown
        if: always()
        run: docker compose down -v

  e2e:
    runs-on: ubuntu-latest
    needs: smoke
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and start stack
        run: docker compose up -d --build

      - name: E2E test
        run: ./ci/e2e.sh

      - name: Logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Teardown
        if: always()
        run: docker compose down -v

  build_and_push:
    runs-on: ubuntu-latest
    needs: e2e
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push core image
        uses: docker/build-push-action@v6
        with:
          context: ./core
          file: ./core/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/cdnlite-core:sha-${{ github.sha }}
            ghcr.io/${{ env.OWNER_LC }}/cdnlite-core:latest

      - name: Build and push edge image
        uses: docker/build-push-action@v6
        with:
          context: ./edge
          file: ./edge/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/cdnlite-edge:sha-${{ github.sha }}
            ghcr.io/${{ env.OWNER_LC }}/cdnlite-edge:latest

      - name: Build and push edge-agent image
        uses: docker/build-push-action@v6
        with:
          context: ./edge
          file: ./edge/agent/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/cdnlite-edge-agent:sha-${{ github.sha }}
            ghcr.io/${{ env.OWNER_LC }}/cdnlite-edge-agent:latest
