events {}

http {
  server {
    listen 80;
    location / {
      default_type application/json;
      return 200 '{"ok":true,"origin_scheme":"http","origin_host":"$host","origin_sni":""}';
    }
  }

  server {
    listen 443 ssl;
    server_name phase3-sni.local;
    ssl_certificate /tmp/origin.crt;
    ssl_certificate_key /tmp/origin.key;
    location / {
      default_type application/json;
      return 200 '{"ok":true,"origin_scheme":"https","origin_host":"$host","origin_sni":"phase3-sni.local"}';
    }
  }

  server {
    listen 443 ssl default_server;
    server_name _;
    ssl_certificate /tmp/origin.crt;
    ssl_certificate_key /tmp/origin.key;
    location / {
      default_type application/json;
      return 200 '{"ok":true,"origin_scheme":"https","origin_host":"$host","origin_sni":"$ssl_server_name"}';
    }
  }
}
