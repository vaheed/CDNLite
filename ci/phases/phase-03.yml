phase: "03"
name: "Edge hot-path performance and bounded telemetry"
owner: "CDNLite maintainers"
status: "complete"
topology: "root docker-compose.yml"
profiles:
  pr:
    clean_required: false
    destructive: false
    commands:
      - "docker compose config --quiet"
      - "find core -name '*.php' -print0 | xargs -0 -n1 php -l"
      - "pytest -q core/tests/test_phase3_edge_hot_path_contract.py"
      - "bash -n ci/phase.sh"
      - "bash -n ci/stress-platform.sh"
  full:
    clean_required: true
    destructive: false
    commands:
      - "docker compose config --quiet"
      - "find core -name '*.php' -print0 | xargs -0 -n1 php -l"
      - "pytest -q core/tests"
      - "sh -n edge/agent/register.sh"
      - "sh -n edge/agent/heartbeat.sh"
      - "sh -n edge/agent/pull_config.sh"
      - "sh -n edge/agent/push_metrics.sh"
      - "sh -n edge/agent/run.sh"
      - "bash -n ci/agent_flow_checks.sh"
      - "bash -n ci/smoke.sh"
      - "bash -n ci/e2e.sh"
      - "bash -n ci/dns_e2e.sh"
      - "bash -n ci/stress-dns.sh"
      - "bash -n ci/stress-platform.sh"
      - "bash -n ci/powerdns_dns_checks.sh"
      - "ci/smoke.sh"
      - "ci/e2e.sh"
      - "ci/stress-platform.sh --scenario phase3-edge-hot-path"
      - "ci/smoke.sh"
      - "ci/e2e.sh"
      - "(cd docs && npm ci && npm run docs:build)"
  release:
    clean_required: true
    destructive: true
    commands:
      - "./ci/phase.sh 03 --profile full --clean"
      - "ci/stress-dns.sh"
required_docs:
  - "docs/ROADMAP.md"
  - "docs/architecture.md"
  - "docs/setup.md"
  - "docs/troubleshooting.md"
  - "CHANGELOG.md"
evidence:
  json: "ci/reports/phase-03-report.json"
  markdown: "ci/reports/phase-03-report.md"
stress_scenarios:
  - "phase3-edge-hot-path"
recovery_assertions:
  - "Malformed snapshots increment reload failure counters without replacing the active worker snapshot."
  - "Telemetry queue limits, drops, flush successes, and flush failures are visible from edge readiness."
  - "Manual local reload and post-stress smoke/e2e gates run after pressure."
