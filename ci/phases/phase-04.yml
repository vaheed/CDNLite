phase: "04"
name: "Real challenge and clearance system"
owner: "CDNLite maintainers"
status: "in progress"
topology: "root docker-compose.yml"
profiles:
  pr:
    clean_required: false
    destructive: false
    commands:
      - "docker compose config --quiet"
      - "find core -name '*.php' -print0 | xargs -0 -n1 php -l"
      - "pytest -q core/tests/test_phase4_challenge_clearance_contract.py"
      - "bash -n ci/phase.sh"
      - "bash -n ci/stress-platform.sh"
  full:
    clean_required: true
    destructive: false
    commands:
      - "docker compose config --quiet"
      - "find core -name '*.php' -print0 | xargs -0 -n1 php -l"
      - "pytest -q core/tests"
      - "sh -n edge/agent/register.sh"
      - "sh -n edge/agent/heartbeat.sh"
      - "sh -n edge/agent/pull_config.sh"
      - "sh -n edge/agent/push_metrics.sh"
      - "sh -n edge/agent/run.sh"
      - "bash -n ci/agent_flow_checks.sh"
      - "bash -n ci/smoke.sh"
      - "bash -n ci/e2e.sh"
      - "bash -n ci/dns_e2e.sh"
      - "bash -n ci/stress-dns.sh"
      - "bash -n ci/stress-platform.sh"
      - "bash -n ci/powerdns_dns_checks.sh"
      - "ci/smoke.sh"
      - "ci/e2e.sh"
      - "ci/stress-platform.sh --scenario phase4-challenge-clearance"
      - "ci/smoke.sh"
      - "ci/e2e.sh"
      - "(cd docs && npm ci && npm run docs:build)"
  release:
    clean_required: true
    destructive: true
    commands:
      - "./ci/phase.sh 04 --profile full --clean"
      - "ci/stress-dns.sh"
required_docs:
  - "docs/ROADMAP.md"
  - "docs/security.md"
  - "docs/setup.md"
  - "docs/troubleshooting.md"
  - "CHANGELOG.md"
evidence:
  json: "ci/reports/phase-04-report.json"
  markdown: "ci/reports/phase-04-report.md"
stress_scenarios:
  - "phase4-challenge-clearance"
recovery_assertions:
  - "Challenge responses return signed clearance metadata instead of only denying the request."
  - "Verified challenge tokens set HttpOnly scoped clearance cookies."
  - "Block rules keep precedence over clearance cookies."
