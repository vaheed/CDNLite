scenarios:
  phase1-reporting-foundation:
    phase: "01"
    workload: "database-reporting-foundation"
    description: "Seed bounded usage data, replay duplicate ingestion, run rollups, reporting queries, retention dry-run, and recovery checks."
    stress:
      event_batches: 3
      duplicate_replay: true
      reporting_queries:
        - "summary"
        - "traffic"
        - "operations"
    recovery:
      - "rerun usage rollup recalculation"
      - "verify duplicate batch count remains stable"
      - "run retention dry-run"
  phase2-analytics-async:
    phase: "02"
    workload: "analytics-async-aggregation"
    description: "Validate async analytics job storage, bounded summary metadata, idempotent aggregate identity, and worker recovery hooks."
    stress:
      event_batches: 3
      rollup_jobs: 2
      reporting_queries:
        - "bounded usage summary"
        - "rollup job status"
    recovery:
      - "rerun queued usage rollup worker"
      - "verify aggregate unique constraint is present"
      - "verify query cache and job tables remain bounded by schema"
  phase3-edge-hot-path:
    phase: "03"
    workload: "edge-hot-path-telemetry"
    description: "Validate worker-local config caching, bounded telemetry queues, manual reload, and ready-health visibility."
    stress:
      requests: 200
      malformed_snapshot_rejected: true
      telemetry_queue_overflow: true
      reporting_queries:
        - "edge ready config status"
        - "telemetry queue status"
    recovery:
      - "manual local config reload succeeds"
      - "last-known-good snapshot remains active after malformed reload"
      - "post-stress smoke and e2e gates run after the pressure scenario"
  phase4-challenge-clearance:
    phase: "04"
    workload: "edge-challenge-clearance"
    description: "Validate signed challenge token issuance, scoped clearance cookies, security-event visibility, and block-rule precedence."
    stress:
      challenge_requests: 200
      invalid_tokens: true
      clearance_reuse: true
    recovery:
      - "invalid or expired challenge tokens keep requiring a challenge"
      - "valid clearance redirects once and then allows matching challenge rules"
      - "block rules remain terminal even when a clearance cookie exists"
  phase5-waiting-room:
    phase: "05"
    workload: "edge-waiting-room-admission"
    description: "Validate overload admission, bounded local queue state, edge-only queue endpoints, and manual emergency recovery."
    stress:
      burst_requests: 300
      invalid_tickets: true
      manual_emergency: true
      queue_overflow: true
    recovery:
      - "manual emergency mode can be deactivated without flapping"
      - "queue and admission counters stay bounded"
      - "post-stress smoke and e2e gates run after overload pressure"
  phase6-cache-correctness:
    phase: "06"
    workload: "edge-cache-correctness"
    description: "Validate safe cache defaults, bounded key dimensions, debug visibility, per-rule TTL honoring, and stale recovery hooks."
    stress:
      cacheable_requests: 300
      authenticated_bypass: true
      query_variants: true
      stale_origin_failure: true
    recovery:
      - "authenticated and no-cache requests bypass by default"
      - "sanitized cache key debug contains bounded dimensions"
      - "post-stress smoke and e2e gates run after cache pressure"
  phase7-origin-resilience:
    phase: "07"
    workload: "origin-routing-resilience"
    description: "Validate primary/backup weighted routing metadata, drain exclusion, edge-origin health observations, bounded idempotent retry metadata, and circuit/shield visibility."
    stress:
      origin_pool_size: 12
      weighted_selection: true
      backup_failover: true
      drained_origins: true
      non_idempotent_retry_block: true
      edge_origin_health_observations: true
    recovery:
      - "primary origins win before backups while eligible"
      - "drained origins are excluded from snapshots and edge pools"
      - "post-stress smoke/e2e gates verify recovery after routing pressure"
