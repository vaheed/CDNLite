services:
  powerdns:
    image: python:3.12-alpine
    working_dir: /srv
    command: sh -lc "python /srv/ci/pdns_mock_server.py"
    environment:
      PDNS_API_KEY: ${POWERDNS_API_KEY:-test-key}
      PDNS_PORT: 8081
    volumes:
      - ./:/srv
    ports:
      - "${POWERDNS_HOST_PORT:-8089}:8081"

  core:
    environment:
      POWERDNS_ENABLED: ${POWERDNS_ENABLED:-1}
      POWERDNS_STRICT: ${POWERDNS_STRICT:-1}
      POWERDNS_API_URL: ${CORE_POWERDNS_API_URL:-http://powerdns:8081}
      POWERDNS_API_KEY: ${POWERDNS_API_KEY:-test-key}
      POWERDNS_SERVER_ID: ${POWERDNS_SERVER_ID:-localhost}

  edge:
    environment:
      CDNLITE_CACHE_DEFAULT_TTL: ${CDNLITE_CACHE_DEFAULT_TTL:-1s}

  edge-agent:
    command: sh -lc 'touch "$${EDGE_CONFIG_PATH:-/var/lib/cdnlite/config.json}" "$${METRIC_PATH:-/var/lib/cdnlite/metrics.ndjson}" && tail -f /dev/null'
